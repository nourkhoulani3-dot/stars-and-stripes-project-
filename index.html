<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backyard BBQ Celebration</title>
    <link rel="stylesheet" href="stars-and-stripes.css">
</head>

<body>

    <main>

        <section id="car-page" class="page car-scene">
            <h2>Guests Arrive at the BBQ</h2>

            <p>
                A colorful car pulls up as guests arrive for the backyard BBQ celebration.
            </p>

            <div class="driveway-scene">
                <div class="driveway-sun"></div>

                <div class="driveway-cloud cloud-a"></div>
                <div class="driveway-cloud cloud-b"></div>

                <div class="house">
                    <div class="roof"></div>
                    <div class="house-body"></div>
                    <div class="door"></div>
                    <div class="window window-one"></div>
                    <div class="window window-two"></div>
                </div>

                <div class="tree">
                    <div class="tree-top"></div>
                    <div class="tree-trunk"></div>
                </div>

                <div class="welcome-sign">BBQ</div>

                <div class="balloons">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>

                <div class="road">
                    <div class="road-line"></div>
                </div>

                <div class="car">
                    <div class="car-top"></div>
                    <div class="car-body"></div>
                    <div class="car-window window-left"></div>
                    <div class="car-window window-right"></div>
                    <div class="wheel wheel-left"></div>
                    <div class="wheel wheel-right"></div>
                    <div class="headlight"></div>
                </div>
            </div>

            <a class="next-button" href="#bbq-page">Next: Join the BBQ</a>
        </section>

        <section id="bbq-page" class="page bbq-scene">

            <h2>Backyard BBQ Celebration</h2>

            <p>
                A lively 4th of July backyard cookout with smoke, fireflies,
                flags, food, family, burgers, hotdogs, and motion.
            </p>

            <div class="bbq-yard">

                <div class="sun"></div>

                <div class="cloud cloud-one"></div>
                <div class="cloud cloud-two"></div>

                <div class="flag-string">
                    <span></span>
                    <span></span>
                    <span></span>
                    <span></span>
                    <span></span>
                </div>

                <div class="fence"></div>

                <div class="grill">
                    <div class="smoke smoke-one"></div>
                    <div class="smoke smoke-two"></div>
                    <div class="smoke smoke-three"></div>

                    <div class="lid"></div>

                    <div class="body">
                        <div class="flame flame-one"></div>
                        <div class="flame flame-two"></div>
                        <div class="flame flame-three"></div>
                    </div>

                    <div class="legs"></div>
                </div>

                <div class="picnic-table">
                    <div class="burger burger-one"></div>
                    <div class="burger burger-two"></div>
                    <div class="hotdog hotdog-one"></div>
                    <div class="hotdog hotdog-two"></div>
                    <div class="cup"></div>
                </div>

                <div class="stick-person person-one">
                    <div class="head"></div>
                    <div class="torso"></div>
                    <div class="arm left-arm"></div>
                    <div class="arm right-arm"></div>
                    <div class="leg left-leg"></div>
                    <div class="leg right-leg"></div>
                </div>

                <div class="stick-person person-two">
                    <div class="head"></div>
                    <div class="torso"></div>
                    <div class="arm left-arm"></div>
                    <div class="arm right-arm"></div>
                    <div class="leg left-leg"></div>
                    <div class="leg right-leg"></div>
                </div>

                <div class="dog">
                    <div class="tail"></div>
                </div>

                <div class="fireflies">
                    <span></span>
                    <span></span>
                    <span></span>
                    <span></span>
                    <span></span>
                </div>

            </div>

            <a class="next-button" href="#car-page">Back to Arrival Scene</a>

        </section>

    </main>

</body>

</html>
